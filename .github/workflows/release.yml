name: Release

on:
  push:
    tags:
      - 'v*'
      - 'cli/*'
      - 'mcp/*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Determine module
        id: module
        run: |
          tag="${{ github.ref_name }}"
          case "$tag" in
            cli/*)
              echo "name=otf-cli" >> "$GITHUB_OUTPUT"
              echo "version=${tag#cli/}" >> "$GITHUB_OUTPUT"
              ;;
            mcp/*)
              echo "name=otf-mcp" >> "$GITHUB_OUTPUT"
              echo "version=${tag#mcp/}" >> "$GITHUB_OUTPUT"
              ;;
            v*)
              echo "name=all" >> "$GITHUB_OUTPUT"
              echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Release CLI
        if: steps.module.outputs.name == 'otf-cli' || steps.module.outputs.name == 'all'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --config .goreleaser/cli.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.module.outputs.version }}

      - name: Release MCP
        if: steps.module.outputs.name == 'otf-mcp' || steps.module.outputs.name == 'all'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --config .goreleaser/mcp.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.module.outputs.version }}
