name: Release

on:
  push:
    tags:
      - 'v*'
      - 'cmd/*/v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Determine module and version
        id: module
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == cmd/*/v* ]]; then
            MODULE="${TAG%/*}"
            MODULE="${MODULE#*/}"
            VERSION="${TAG##*/v}"
            echo "name=$MODULE" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "name=sdk" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build SDK
        if: steps.module.outputs.name == 'sdk'
        run: |
          go test -count=1 ./...
          go vet ./...

      - name: Install GoReleaser
        if: steps.module.outputs.name != 'sdk'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest

      - name: Release CLI
        if: steps.module.outputs.name == 'otf-cli'
        run: goreleaser release --config .goreleaser/cli.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Release MCP
        if: steps.module.outputs.name == 'otf-mcp'
        run: goreleaser release --config .goreleaser/mcp.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate release notes
        if: steps.module.outputs.name == 'sdk'
        id: notes
        run: |
          VER="${{ steps.module.outputs.version }}"
          echo "title=otf_api v$VER" >> "$GITHUB_OUTPUT"
          echo "notes=## otf_api v$VER\n\nGo SDK for the OrangeTheory Fitness API." >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.module.outputs.name == 'sdk'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.notes.outputs.title }}
          body: ${{ steps.notes.outputs.notes }}
