name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["stable"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Tidy
        run: go mod tidy && git diff --exit-code -- go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -count=1 ./...
