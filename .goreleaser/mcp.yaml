version: 2

project_name: otf-mcp
git:
  tag_prefix: cmd/otf-mcp/

builds:
  - id: otf-mcp
    main: ./cmd/otf-mcp/
    binary: otf-mcp
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]

archives:
  - id: otf-mcp
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "otf-mcp-sha256sums.txt"
  algorithm: sha256

homebrew_casks:
  - name: otf-mcp
    repository:
      owner: ammiranda
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    commit_author:
      name: goreleaser
      email: goreleaser@localhost
    binaries:
      - otf-mcp
    homepage: "https://github.com/ammiranda/otf_api"
    description: "MCP server for the OrangeTheory Fitness API — AI-ready class booking"
    license: "MIT"

release:
  github:
    owner: ammiranda
    name: otf_api
  header: "{{ .ProjectName }} v{{ .Version }}"
  prerelease: auto
